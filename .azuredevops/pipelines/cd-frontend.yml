resources:
  repositories:
    - repository: templates
      type: git
      name: devops-pipeline-templates
      ref: refs/heads/main

trigger:
  branches:
    include: [ main ]
  paths:
    include:
      - frontend/**
      - packages/ui/**

pool:
  vmImage: ubuntu-latest

jobs:
  - job: DeployFrontend
    displayName: 'Build & Deploy Frontend'
    steps:
      - checkout: self

      - template: templates/docker-build.yml@templates
        parameters:
          imageName: 'dzukku-frontend'
          dockerfile: 'frontend/Dockerfile'
          buildContext: 'frontend'
