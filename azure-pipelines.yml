# ────────────────────────────────────────────────────────────────────────────
# Dzukku Food OS — Azure DevOps CI/CD Pipeline
# ────────────────────────────────────────────────────────────────────────────
#
# Two build stages run in parallel:
#   1. Backend (DzukkuBot)    → Docker image → ACR → App Service
#   2. Frontend (POS)         → Vite build    → Blob Storage / Static Web App
#
# Required Pipeline Variables (set in Library or Pipeline UI):
#   ACR_NAME              – Azure Container Registry login server
#   ACR_USERNAME          – ACR admin / service-principal username
#   ACR_PASSWORD          – ACR password (mark as secret)
#   APP_SERVICE_NAME      – Target Azure App Service / Container App name
#   AZURE_SUBSCRIPTION    – Service connection name in Azure DevOps
#
# Optional:
#   FRONTEND_STORAGE_ACCOUNT – Storage account for static site hosting
#   DEPLOY_TO_PRODUCTION     – Set to 'true' to deploy; default: build-only
# ────────────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - DzukkuBot/**
      - restaurant-pos-frontend/**
      - azure-pipelines.yml

pr:
  branches:
    include:
      - main

variables:
  # ── Image tagging ──
  imageRepository: dzukku-bot
  dockerfilePath: DzukkuBot/Dockerfile
  buildContext: DzukkuBot
  tag: $(Build.BuildId)

  # ── Frontend ──
  frontendWorkingDir: restaurant-pos-frontend

  # ── Default deployment toggle (override in Pipeline UI) ──
  DEPLOY_TO_PRODUCTION: false

stages:
  # ══════════════════════════════════════════════════════════════════════════
  # STAGE 1 — Build
  # ══════════════════════════════════════════════════════════════════════════
  - stage: Build
    displayName: Build
    jobs:
      # ── Backend Docker Build ─────────────────────────────────────────────
      - job: BuildBackend
        displayName: Build and push backend Docker image
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: Docker@2
            displayName: Build Docker image
            inputs:
              command: build
              repository: $(imageRepository)
              dockerfile: $(dockerfilePath)
              buildContext: $(buildContext)
              tags: |
                $(tag)
                latest

          - task: Docker@2
            displayName: Push to ACR
            condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
            inputs:
              command: push
              containerRegistry: $(AZURE_SUBSCRIPTION)
              repository: $(imageRepository)
              dockerfile: $(dockerfilePath)
              buildContext: $(buildContext)
              tags: |
                $(tag)
                latest

      # ── Frontend Build ──────────────────────────────────────────────────
      - job: BuildFrontend
        displayName: Build frontend (React / Vite)
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            displayName: Install Node.js
            inputs:
              versionSpec: 20.x

          - script: |
              npm ci
            displayName: Install dependencies
            workingDirectory: $(frontendWorkingDir)

          - script: |
              npm run build
            displayName: Build production bundle
            workingDirectory: $(frontendWorkingDir)

          - task: CopyFiles@2
            displayName: Copy built assets
            inputs:
              sourceFolder: $(frontendWorkingDir)/dist
              contents: '**'
              targetFolder: $(Build.ArtifactStagingDirectory)/frontend

          - task: PublishBuildArtifacts@1
            displayName: Publish frontend artifact
            inputs:
              pathToPublish: $(Build.ArtifactStagingDirectory)/frontend
              artifactName: frontend-dist

  # ══════════════════════════════════════════════════════════════════════════
  # STAGE 2 — Deploy (only when DEPLOY_TO_PRODUCTION = true)
  # ══════════════════════════════════════════════════════════════════════════
  - stage: Deploy
    displayName: Deploy to Azure
    condition: and(succeeded(), eq(variables['DEPLOY_TO_PRODUCTION'], 'true'))
    jobs:
      # ── Deploy Backend to App Service ──────────────────────────────────
      - job: DeployBackend
        displayName: Deploy backend to App Service
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: AzureWebAppContainer@1
            displayName: Deploy container to App Service
            inputs:
              azureSubscription: $(AZURE_SUBSCRIPTION)
              appName: $(APP_SERVICE_NAME)
              imageName: $(ACR_NAME)/$(imageRepository):$(tag)

      # ── Deploy Frontend to Blob Storage (static site) ──────────────────
      - job: DeployFrontend
        displayName: Deploy frontend to static site
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: DownloadBuildArtifacts@1
            displayName: Download frontend build
            inputs:
              artifactName: frontend-dist
              downloadPath: $(System.ArtifactsDirectory)

          - task: AzureCLI@2
            displayName: Upload to blob storage
            inputs:
              azureSubscription: $(AZURE_SUBSCRIPTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az storage blob upload-batch \
                  --account-name $(FRONTEND_STORAGE_ACCOUNT) \
                  --auth-mode login \
                  --destination '$web' \
                  --source '$(System.ArtifactsDirectory)/frontend-dist' \
                  --overwrite true
